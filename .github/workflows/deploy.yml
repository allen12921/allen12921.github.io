name: Deploy Jekyll Site

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "可选：指定 commit SHA；填写后优先于所选分支"
        required: false
        type: string    
      environment:
        description: 'Select deployment environment'
        required: true
        type: choice
        options:
          - development
          - staging
          - production
        default: development

jobs:
  deploy:
    name: Build & Deploy (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Resolve deploy ref
        id: resolve
        run: |
          if [ -n "${{ inputs.commit_sha }}" ]; then
            echo "ref=${{ inputs.commit_sha }}" >> "$GITHUB_OUTPUT"
            echo "mode=commit_sha" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "mode=branch" >> "$GITHUB_OUTPUT"
          fi
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.ref }}
          fetch-depth: 0

      - name: Set environment variables
        run: |
          case "${{ github.event.inputs.environment }}" in
            development)
              echo "JEKYLL_ENV=development" >> $GITHUB_ENV
              echo "SITE_URL=http://localhost:4000" >> $GITHUB_ENV
              echo "DEPLOY_BRANCH=dev" >> $GITHUB_ENV
              ;;
            staging)
              echo "JEKYLL_ENV=staging" >> $GITHUB_ENV
              echo "SITE_URL=https://staging.allen12921.github.io" >> $GITHUB_ENV
              echo "DEPLOY_BRANCH=staging" >> $GITHUB_ENV
              ;;
            production)
              echo "JEKYLL_ENV=production" >> $GITHUB_ENV
              echo "SITE_URL=https://allen12921.github.io" >> $GITHUB_ENV
              echo "DEPLOY_BRANCH=master" >> $GITHUB_ENV
              ;;
          esac

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: ${{ env.JEKYLL_ENV }}

      - name: Deploy to GitHub Pages
        if: ${{ github.event.inputs.environment == 'production' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages

      - name: Upload build artifact (non-production)
        if: ${{ github.event.inputs.environment != 'production' }}
        uses: actions/upload-artifact@v4
        with:
          name: site-${{ github.event.inputs.environment }}-${{ github.run_number }}
          path: ./_site
          retention-days: 3
