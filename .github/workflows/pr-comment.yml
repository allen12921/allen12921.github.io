name: PR Comment

on:
  pull_request:
    types: [opened, synchronize, closed]

jobs:
  comment:
    name: Comment on PR
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Comment PR info
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const event = context.payload.action;
            const eventLabel = { opened: '创建', synchronize: '更新', closed: '关闭' }[event] || event;

            const lines = [
              `### PR ${eventLabel}`,
              `**标题：** ${pr.title}`,
              `**Source Branch SHA：** \`${pr.head.sha}\``,
            ];

            if (event === 'closed') {
              const merged = pr.merged;
              lines.push(`**状态：** ${merged ? '已合并 ✅' : '未合并关闭 ❌'}`);
              lines.push(`**目标分支：** \`${pr.base.ref}\``);
            }

            const body = lines.join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
